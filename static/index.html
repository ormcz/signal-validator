<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Czech Railway Signal QA</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Your Custom CSS -->
    <link rel="stylesheet" href="static/style.css" />
</head>

<body>

    <!-- Main UI Controls -->
    <div id="controls">
        <!-- Toolbar: Redownload and Custom Zoom Buttons -->
        <div class="button-row">
            <div id="btn" title="Re-fetch data from Overpass API">🔄 Redownload</div>
            <div id="zoom-in" class="zoom-btn" title="Zoom In">＋</div>
            <div id="zoom-out" class="zoom-btn" title="Zoom Out">－</div>
        </div>

        <div id="layer-switch" class="segmented-control"></div>

        <!-- Filter Panel -->
        <div id="filter-container">
            <h3>Filter Issues</h3>
            <div id="error-list">
                <!-- Javascript will inject checkboxes and legend here -->
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="overlay">
        <div class="loader">
            <span class="spinner"></span>
            Downloading OSM data…
        </div>
    </div>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Your Custom App Logic -->
    <script src="static/app.js"></script>

</body>
</html>
